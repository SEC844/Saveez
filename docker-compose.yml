services:
  # --------------------------------------------------------
  # PostgreSQL database
  # --------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: epargne_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-epargne_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?The POSTGRES_PASSWORD env var is required}
      POSTGRES_DB: ${POSTGRES_DB:-epargne_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # expose only locally — remove in production
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-epargne_user} -d ${POSTGRES_DB:-epargne_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # Next.js application
  # --------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner # jump straight to the production stage
    container_name: epargne_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-epargne_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-epargne_db}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    # Run Prisma migrations at startup before launching Next.js
    command: >
      sh -c "
        ./node_modules/.bin/prisma migrate deploy &&
        node server.js
      "

volumes:
  postgres_data:
