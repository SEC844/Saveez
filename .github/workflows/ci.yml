name: CI — TypeScript & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build
        env:
          # Dummy values — only needed for build-time validation, not runtime
          DATABASE_URL: postgresql://user:pass@localhost:5432/epargne_db
          NEXTAUTH_SECRET: ci-dummy-secret-32-chars-minimum-ok
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build
