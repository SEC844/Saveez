# ==============================================================================
#  docker-compose.dev.yml — Développement local uniquement
#
#  Lance PostgreSQL en local + build l'image depuis les sources.
#  Nécessite un fichier .env à la racine du projet.
#
#  Exemple .env minimal :
#    POSTGRES_PASSWORD=devpassword
#    NEXTAUTH_SECRET=devsecret
#
#  Usage :
#    docker compose -f docker-compose.dev.yml up --build
# ==============================================================================

services:

  # ── Base de données locale ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: saveez_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saveez_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD est requis dans .env}
      POSTGRES_DB: ${POSTGRES_DB:-saveez_db}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saveez_user} -d ${POSTGRES_DB:-saveez_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application (build local) ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saveez_app_dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # En dev local, DATABASE_URL est construit directement (PostgreSQL est connu)
      DATABASE_URL: postgresql://${POSTGRES_USER:-saveez_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-saveez_db}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET est requis dans .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    command: [ "node", "scripts/start.js" ]

volumes:
  postgres_data_dev:
    driver: local
